<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <style>
    .title{font:700 30px Arial;fill:#111827}
    .note{font:400 14px Arial;fill:#475569}
    .entity{fill:#ffffff;stroke:#111827;stroke-width:2.2}
    .relationship{fill:#fefce8;stroke:#854d0e;stroke-width:2.2}
    .attr{fill:#f8fafc;stroke:#334155;stroke-width:1.5}
    .key{fill:#ecfdf5;stroke:#047857;stroke-width:1.8}
    .text{font:700 15px Arial;fill:#111827}
    .small{font:400 12px Arial;fill:#334155}
    .line{stroke:#475569;stroke-width:1.8;fill:none}
    .card{font:700 13px Arial;fill:#0f766e}
    .underline{text-decoration:underline}
  </style>

  <text x="48" y="52" class="title">Modelo Conceitual Tradicional (DER)</text>
  <text x="48" y="78" class="note">Notação tradicional: entidades em retângulos, atributos em elipses e relacionamentos em losangos.</text>

  <!-- Entidades -->
  <rect x="110" y="190" width="190" height="58" class="entity"/>
  <text x="205" y="225" text-anchor="middle" class="text">PROFISSIONAL</text>

  <rect x="660" y="190" width="190" height="58" class="entity"/>
  <text x="755" y="225" text-anchor="middle" class="text">PACIENTE</text>

  <rect x="660" y="510" width="190" height="58" class="entity"/>
  <text x="755" y="545" text-anchor="middle" class="text">AVALIAÇÃO</text>

  <rect x="1180" y="510" width="190" height="58" class="entity"/>
  <text x="1275" y="545" text-anchor="middle" class="text">SINTOMA</text>

  <rect x="1180" y="190" width="190" height="58" class="entity"/>
  <text x="1275" y="225" text-anchor="middle" class="text">PESO SINTOMA</text>

  <rect x="110" y="510" width="190" height="58" class="entity"/>
  <text x="205" y="545" text-anchor="middle" class="text">LIMIAR DECISÃO</text>

  <rect x="420" y="820" width="190" height="58" class="entity"/>
  <text x="515" y="855" text-anchor="middle" class="text">FAMILIAR</text>

  <rect x="900" y="820" width="190" height="58" class="entity"/>
  <text x="995" y="855" text-anchor="middle" class="text">DOCUMENTO</text>

  <!-- Relacionamentos -->
  <polygon points="445,219 505,179 565,219 505,259" class="relationship"/>
  <text x="505" y="224" text-anchor="middle" class="small">acompanha</text>

  <polygon points="755,360 815,320 875,360 815,400" class="relationship"/>
  <text x="815" y="365" text-anchor="middle" class="small">possui</text>

  <polygon points="1015,539 1075,499 1135,539 1075,579" class="relationship"/>
  <text x="1075" y="544" text-anchor="middle" class="small">marca</text>

  <polygon points="1275,360 1335,320 1395,360 1335,400" class="relationship"/>
  <text x="1335" y="365" text-anchor="middle" class="small">define</text>

  <polygon points="445,539 505,499 565,539 505,579" class="relationship"/>
  <text x="505" y="544" text-anchor="middle" class="small">aplica</text>

  <polygon points="635,705 695,665 755,705 695,745" class="relationship"/>
  <text x="695" y="710" text-anchor="middle" class="small">tem</text>

  <polygon points="875,705 935,665 995,705 935,745" class="relationship"/>
  <text x="935" y="710" text-anchor="middle" class="small">anexa</text>

  <!-- Linhas e cardinalidades -->
  <path d="M300 219 H445" class="line"/><path d="M565 219 H660" class="line"/>
  <text x="322" y="207" class="card">N</text><text x="640" y="207" class="card">N</text>

  <path d="M755 248 V320" class="line"/><path d="M755 400 V510" class="line"/>
  <text x="768" y="275" class="card">1</text><text x="768" y="490" class="card">N</text>

  <path d="M850 539 H1015" class="line"/><path d="M1135 539 H1180" class="line"/>
  <text x="865" y="526" class="card">N</text><text x="1160" y="526" class="card">N</text>

  <path d="M1275 248 V320" class="line"/><path d="M1275 400 V510" class="line"/>
  <text x="1288" y="275" class="card">1</text><text x="1288" y="490" class="card">N</text>

  <path d="M300 539 H445" class="line"/><path d="M565 539 H660" class="line"/>
  <text x="322" y="526" class="card">1</text><text x="640" y="526" class="card">N</text>

  <path d="M715 568 L695 665" class="line"/><path d="M665 735 L570 820" class="line"/>
  <text x="725" y="600" class="card">1</text><text x="600" y="812" class="card">N</text>

  <path d="M795 568 L935 665" class="line"/><path d="M935 745 L995 820" class="line"/>
  <text x="825" y="600" class="card">1</text><text x="985" y="812" class="card">N</text>

  <!-- Atributos principais -->
  <ellipse cx="105" cy="116" rx="54" ry="24" class="key"/><text x="105" y="121" text-anchor="middle" class="small underline">id</text>
  <ellipse cx="205" cy="116" rx="56" ry="24" class="attr"/><text x="205" y="121" text-anchor="middle" class="small">nome</text>
  <ellipse cx="305" cy="116" rx="62" ry="24" class="attr"/><text x="305" y="121" text-anchor="middle" class="small">email</text>
  <path d="M125 137 L170 190" class="line"/><path d="M205 140 V190" class="line"/><path d="M285 137 L240 190" class="line"/>

  <ellipse cx="630" cy="116" rx="54" ry="24" class="key"/><text x="630" y="121" text-anchor="middle" class="small underline">id</text>
  <ellipse cx="750" cy="116" rx="68" ry="24" class="attr"/><text x="750" y="121" text-anchor="middle" class="small">dados pessoais</text>
  <ellipse cx="890" cy="116" rx="75" ry="24" class="attr"/><text x="890" y="121" text-anchor="middle" class="small">fotos/documentos</text>
  <path d="M650 137 L710 190" class="line"/><path d="M750 140 V190" class="line"/><path d="M870 137 L800 190" class="line"/>

  <ellipse cx="630" cy="455" rx="54" ry="24" class="key"/><text x="630" y="460" text-anchor="middle" class="small underline">id</text>
  <ellipse cx="755" cy="455" rx="62" ry="24" class="attr"/><text x="755" y="460" text-anchor="middle" class="small">score</text>
  <ellipse cx="890" cy="455" rx="88" ry="24" class="attr"/><text x="890" y="460" text-anchor="middle" class="small">recomendação</text>
  <path d="M650 476 L700 510" class="line"/><path d="M755 479 V510" class="line"/><path d="M865 476 L810 510" class="line"/>

  <ellipse cx="1165" cy="455" rx="54" ry="24" class="key"/><text x="1165" y="460" text-anchor="middle" class="small underline">id</text>
  <ellipse cx="1275" cy="455" rx="72" ry="24" class="attr"/><text x="1275" y="460" text-anchor="middle" class="small">descrição</text>
  <ellipse cx="1395" cy="455" rx="70" ry="24" class="attr"/><text x="1395" y="460" text-anchor="middle" class="small">categoria</text>
  <path d="M1185 476 L1220 510" class="line"/><path d="M1275 479 V510" class="line"/><path d="M1375 476 L1330 510" class="line"/>

  <text x="48" y="1000" class="note">Chaves principais aparecem sublinhadas. As cardinalidades indicam a leitura geral dos relacionamentos da aplicação.</text>
</svg>
