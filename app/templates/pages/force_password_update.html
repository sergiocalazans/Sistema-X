{% extends "base.html" %}

{% block body %}
  <div class="login-page">
    <div class="login-card card fade-in">
      <div class="login-brand">
        <div class="login-logo" data-icon="settings"></div>
        <div class="login-title">Atualizar senha</div>
        <div class="login-subtitle">Defina uma senha pessoal para continuar</div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form class="login-form" method="post" action="{{ url_for('auth.force_password_update') }}">
        <div class="form-group">
          <label class="form-label">Nova senha</label>
          <input name="nova_senha" class="form-input form-control" type="password" minlength="6" autocomplete="new-password" required />
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar nova senha</label>
          <input name="confirmar_senha" class="form-input form-control" type="password" minlength="6" autocomplete="new-password" required />
        </div>
        <button class="btn btn-primary btn-login" type="submit">Atualizar senha</button>
      </form>
    </div>
  </div>
{% endblock %}
