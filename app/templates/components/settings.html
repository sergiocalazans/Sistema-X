<template id="tpl-settings">
  <div class="page-header">
    <div class="page-title">Configuracoes</div>
    <div class="page-subtitle">Atualize seu login e senha de acesso</div>
  </div>

  <div class="page-body">
    <div class="settings-grid">
      <section class="form-section">
        <div class="form-section-title">Dados de login</div>
        <form id="profile-form">
          <div class="form-group">
            <label class="form-label">Nome</label>
            <input id="settings-name" class="form-input" required />
          </div>
          <div class="form-group">
            <label class="form-label">E-mail de login</label>
            <input id="settings-email" class="form-input" type="email" required />
          </div>
          <div class="form-group">
            <label class="form-label">Especialidade</label>
            <input id="settings-specialty" class="form-input" required />
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Salvar login</button>
          </div>
        </form>
      </section>

      <section class="form-section">
        <div class="form-section-title">Alterar senha</div>
        <form id="password-form">
          <div class="form-group">
            <label class="form-label">Senha atual</label>
            <input id="current-password" class="form-input" type="password" required />
          </div>
          <div class="form-group">
            <label class="form-label">Nova senha</label>
            <input id="new-password" class="form-input" type="password" minlength="6" required />
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar nova senha</label>
            <input id="confirm-password" class="form-input" type="password" minlength="6" required />
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Alterar senha</button>
          </div>
        </form>
      </section>
    </div>
  </div>
</template>
