<template id="tpl-dashboard">
  <div class="page-header">
    <div class="page-title">Dashboard</div>
    <div class="page-subtitle">Visão geral do sistema de triagem</div>
  </div>

  <div class="page-body">
    <div class="stats-grid">
      <div class="stat-card card">
        <div class="stat-icon blue" data-icon="users"></div>
        <div class="stat-label">Total de Pacientes</div>
        <div class="stat-value" data-slot="total-patients">0</div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon green" data-icon="clipboard"></div>
        <div class="stat-label">Avaliações</div>
        <div class="stat-value" data-slot="total-assessments">0</div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon orange" data-icon="chart"></div>
        <div class="stat-label">Encaminhamentos</div>
        <div class="stat-value" data-slot="total-referrals">0</div>
      </div>
    </div>

    <div class="table-card card">
      <div class="table-header">
        <span class="table-title">Avaliações Recentes</span>
      </div>
      <div class="table-wrap table-responsive" data-slot="recent-assessments"></div>
    </div>
  </div>
</template>
