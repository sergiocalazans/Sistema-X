<template id="tpl-shell">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo" data-icon="pulse"></div>
        <div class="sidebar-brand-text">
          <div class="brand-name">Triagem SXF</div>
          <div class="brand-sub" data-slot="user-name">Sistema Clínico</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="dashboard"><span data-icon="dashboard"></span>Dashboard</a>
        <a class="nav-item" data-page="historico"><span data-icon="users"></span>Pacientes</a>
        <a class="nav-item" data-page="triagem"><span data-icon="clipboard"></span>Nova Triagem</a>
        <a class="nav-item" data-page="avaliacoes"><span data-icon="chart"></span>Histórico</a>
        <a class="nav-item" data-page="relatorios"><span data-icon="barChart"></span>Relatórios</a>
        <a class="nav-item" data-page="configuracoes"><span data-icon="settings"></span>Configurações</a>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item theme-toggle" id="btn-theme-toggle" type="button">
          <span class="theme-icon-dark" data-icon="moon"></span>
          <span class="theme-icon-light" data-icon="sun"></span>
          <span data-theme-label>Modo escuro</span>
        </button>
        <a class="nav-item danger" id="btn-logout"><span data-icon="logout"></span>Sair</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="mobile-topbar">
        <button class="mobile-menu-btn" id="btn-mobile-menu" type="button" aria-label="Abrir menu">
          <span data-icon="menu"></span>
        </button>
        <div class="mobile-brand">Triagem SXF</div>
      </header>
      <div id="page-content"></div>
    </main>
    <button class="sidebar-backdrop" id="sidebar-backdrop" type="button" aria-label="Fechar menu"></button>
  </div>
</template>
