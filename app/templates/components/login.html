<template id="tpl-login">
  <div class="login-page">
    <button class="login-theme-toggle theme-toggle" id="btn-theme-toggle" type="button">
      <span class="theme-icon-dark" data-icon="moon"></span>
      <span class="theme-icon-light" data-icon="sun"></span>
      <span data-theme-label>Modo escuro</span>
    </button>

    <div class="login-card card fade-in">
      <div class="login-brand">
        <div class="login-logo" data-icon="pulse"></div>
        <div class="login-title">Sistema de Triagem Clínica</div>
        <div class="login-subtitle">Síndrome do X Frágil</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Entrar</button>
        <button class="auth-tab" data-mode="register">Cadastrar</button>
      </div>

      <form class="login-form" id="auth-form">
        <div class="register-only hidden">
          <div class="form-group">
            <label class="form-label">Nome</label>
            <input id="auth-name" class="form-input form-control" value="Profissional" />
          </div>
          <div class="form-group">
            <label class="form-label">Especialidade</label>
            <input id="auth-specialty" class="form-input form-control" value="Saúde" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input
            id="auth-email"
            class="form-input form-control"
            type="email"
            value="contato@sxf.com"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Senha</label>
          <input
            id="auth-password"
            class="form-input form-control"
            type="password"
            value="123456"
            required
          />
        </div>

        <button class="btn btn-primary btn-login" id="btn-auth" type="submit">
          Entrar
        </button>
      </form>
    </div>
  </div>
</template>
