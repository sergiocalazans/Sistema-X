<template id="tpl-reports">
  <div class="page-header">
    <div class="page-title">Relatórios</div>
    <div class="page-subtitle">Indicadores e análises da triagem SXF</div>
  </div>

  <div class="page-body">
    <div class="stats-grid reports-kpi-grid">
      <div class="stat-card card">
        <div class="stat-icon blue" data-icon="clipboard"></div>
        <div class="stat-label">Avaliações</div>
        <div class="stat-value" data-slot="total-assessments">0</div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon orange" data-icon="arrow"></div>
        <div class="stat-label">Taxa de Encaminhamento</div>
        <div class="stat-value" data-slot="referral-rate">0%</div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon green" data-icon="barChart"></div>
        <div class="stat-label">Score Médio</div>
        <div class="stat-value" data-slot="average-score">0</div>
      </div>
      <div class="stat-card card">
        <div class="stat-icon purple" data-icon="users"></div>
        <div class="stat-label">Sintoma Mais Frequente</div>
        <div class="stat-value compact" data-slot="most-frequent-symptom">Sem dados</div>
      </div>
    </div>

    <div class="reports-grid">
      <div class="report-card card">
        <div class="report-card-header">
          <div>
            <div class="report-title">Distribuição de Recomendações</div>
            <div class="report-subtitle">Encaminhar versus não prioritário</div>
          </div>
        </div>
        <div class="plot-container" id="chart-recommendations"></div>
      </div>

      <div class="report-card card">
        <div class="report-card-header">
          <div>
            <div class="report-title">Score por Sexo</div>
            <div class="report-subtitle">Dispersão e mediana dos scores</div>
          </div>
        </div>
        <div class="plot-container" id="chart-score-sex"></div>
      </div>

      <div class="report-card card">
        <div class="report-card-header">
          <div>
            <div class="report-title">Avaliações por Mês</div>
            <div class="report-subtitle">Volume de triagens ao longo do tempo</div>
          </div>
        </div>
        <div class="plot-container" id="chart-monthly"></div>
      </div>

      <div class="report-card card">
        <div class="report-card-header">
          <div>
            <div class="report-title">Sintomas Mais Frequentes</div>
            <div class="report-subtitle">Ocorrências marcadas nos checklists</div>
          </div>
        </div>
        <div class="plot-container" id="chart-symptoms"></div>
      </div>
    </div>

    <div class="reports-table-grid">
      <div class="table-card card">
        <div class="table-header"><span class="table-title">Indicadores por sexo</span></div>
        <div class="table-wrap table-responsive" data-slot="by-sex-table"></div>
      </div>

      <div class="table-card card">
        <div class="table-header"><span class="table-title">Top sintomas</span></div>
        <div class="table-wrap table-responsive" data-slot="top-symptoms-table"></div>
      </div>
    </div>
  </div>
</template>
